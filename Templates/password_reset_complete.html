{% extends 'nav.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-image: url("{% static 'dark.jpg' %}");
        background-size: cover; background-position: center;
        background-attachment: fixed; background-repeat: no-repeat;
    }
    .glass-panel {
        background-color: rgba(255, 255, 255, 0.40);
        backdrop-filter: blur(8px); border: none;
    }
</style>

<div class="container">
    <div class="row min-vh-100">
        <div class="col-3"></div>
        <div class="col align-self-center p-5 rounded-4 shadow-lg glass-panel text-center">
            <h2 class="fw-bold mb-3 text-success">Password Reset Complete! ✅</h2>
            <p class="text-dark mb-4">Your new password has been set. You can now log in using your new credentials.</p>
            <a href="{% url 'login' %}" class="btn btn-primary rounded-pill w-100 py-2 fw-bold">Go to Login</a>
        </div>
        <div class="col-3"></div>
    </div>
</div>
{% endblock %}
