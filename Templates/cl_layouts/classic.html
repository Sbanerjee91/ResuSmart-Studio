<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Executive Cover Letter Sheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
        background: 
            radial-gradient(circle at top right, rgba(255, 122, 89, 0.25), transparent 40%),
            radial-gradient(circle at bottom left, rgba(255, 122, 89, 0.2), transparent 35%),
            radial-gradient(circle at bottom right, rgba(255, 105, 180, 0.2), transparent 45%),
            radial-gradient(circle at top left, rgba(240, 248, 255, 0.5), transparent 50%),
            #ffffff;
        font-family: 'Inter', sans-serif;
        color: #212529;
        line-height: 1.6;
        padding: 40px;
    }
        .a4-paper { width: 100%; max-width: 740px; margin: 0 auto; background: #ffffff; position: relative; }
        .header-box { border: 2px solid #dfa27a; text-align: center; padding: 20px 10px; margin-bottom: 35px; }
        .header-box h1 { font-family: 'Bodoni Moda', serif; font-size: 2.4rem; text-transform: uppercase; color: #000000; margin-bottom: 5px; }
        .header-box p { font-size: 0.95rem; letter-spacing: 3px; text-transform: uppercase; font-weight: 500; color: #333333; }
        .meta-section { margin-bottom: 30px; font-size: 0.95rem; }
        .current-date { margin-bottom: 25px; color: #444444; }
        .recipient-info { font-weight: 500; }
        .salutation { font-weight: 700; margin-bottom: 20px; }
        .letter-content { font-size: 0.95rem; color: #333333; text-align: justify; margin-bottom: 35px; }
        .letter-content br { content: ""; margin: 10px 0; display: block; }
        .signature-section { margin-bottom: 50px; }
        .signature-img { max-height: 55px; max-width: 220px; margin: 5px 0; display: block; }
        .sender-signature-name { font-weight: 700; color: #000000; }
        .sender-title { font-size: 0.9rem; color: #666666; font-style: italic; }
        .footer-ribbon { border-top: 2px solid #dfa27a; border-bottom: 2px solid #dfa27a; padding: 12px 5px; display: flex; justify-content: space-around; font-size: 0.85rem; font-weight: 500; color: #222222; }
    </style>
</head>
<body>

    <div class="a4-paper">
        <div class="header-box">
            <h1 id="view-sender_name">Your Name</h1>
            <p id="view-job_title">Target Designation</p>
        </div>
        
        <div class="meta-section">
            <div class="current-date" id="view-current_date">May 27, 2026</div>
            <div class="recipient-info">
                <div style="font-weight:700;" id="view-recipient_name">Hiring Team Panel</div>
                <div id="view-company_name">Company Name Inc.</div>
            </div>
        </div>
        
        <div class="salutation">
            Dear <span id="view-salutation_name">Hiring Team</span>,
        </div>
        
        <div class="letter-content" id="view-letter_body">
            Your text content will sync here live...
        </div>
        
        <div class="signature-section">
            <p>Sincerely,</p>
            <img id="view-signature_image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Signature Trace" class="signature-img" style="display: none;">
            <div style="font-weight:700;" id="view-sender_name_fallback">Your Name</div>
            <div class="sender-title">Applicant</div>
        </div>
        
        <div class="footer-ribbon">
            <div>📞 <span id="view-sender_phone">+91 0000000000</span></div>
            <div>✉️ <span id="view-sender_email">yourname@example.com</span></div>
            <div>📍 <span id="view-sender_location">Your City, India</span></div>
        </div>
    </div>

</body>
</html>
