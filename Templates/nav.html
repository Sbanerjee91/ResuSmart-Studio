<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResuMe</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
  <style>
        .glass-nav {
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        @view-transition {
            navigation: auto;
        }

        /* Customize the transition to make it feel ultra-premium */
        ::view-transition-old(root) {
            animation: 250ms ease-out both fade-out, 250ms ease-out both scale-down;
        }

        ::view-transition-new(root) {
            animation: 300ms ease-in both fade-in, 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275) both scale-up;
        }

        /* Keyframes for the custom animations */
        @keyframes fade-out {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes scale-down {
            from { transform: scale(1); }
            to { transform: scale(0.98); }
        }
        @keyframes scale-up {
            from { transform: scale(1.02); }
            to { transform: scale(1); }
        }
  </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark glass-nav sticky-top py-2">
  <div class="container-fluid">
    <a class="navbar-brand ms-4 fw-bold" href="/">ResuMe</a>
    
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto me-5 align-items-center">

        {% if user.is_authenticated %}
            
            <li class="nav-item ms-lg-2 w-100">
              <a class="btn btn-danger rounded-pill px-3 fw-bold w-100" href="{% url 'logout' %}">Logout</a>
            </li>


        {% else %}

            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="/signup">Signup</a>
            </li>
            
            <li class="nav-item ms-lg-4 my-2 my-lg-0 w-100">
              <a class="btn btn-outline-light rounded-pill px-4 fw-bold w-100" href="/login">Login</a>
            </li>
            

        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<main>
{% block content %}
{% endblock %}
</main>

</body>
</html>
