{% extends 'nav.html' %}
{% load static %}

{% block content %}
<style>
    body {
        background-image: url("{% static 'dark.jpg' %}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;  
        background-repeat: no-repeat;
    }
    .glass-panel {
        background-color: rgba(255, 255, 255, 0.40);
        backdrop-filter: blur(8px);
        border: none;
    }
</style>

<div class="container">
    <div class="row min-vh-100">
        <div class="col-3"></div>
        
        <div class="col align-self-center p-5 rounded-4 shadow-lg glass-panel">
            <h2 class="fw-bold text-center mb-3">Reset Password</h2>
            <p class="text-center text-dark mb-4">Enter your email address below, and we'll send you instructions on how to reset your password.</p>

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Email address</label>
                    <input type="email" name="email" class="form-control rounded-pill" required>
                </div>
                
                <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold">Send Reset Email</button>
            </form>
        </div>
        
        <div class="col-3"></div>
    </div>
</div>
{% endblock %}
